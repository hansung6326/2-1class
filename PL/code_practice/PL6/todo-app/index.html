<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>매일 할 일</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="app">
    <header class="header">
      <h1 class="title">매일 할 일</h1>
      <p class="subtitle">오늘 해야 할 일을 적고 하나씩 지워가요</p>
    </header>

    <form class="add-form" id="add-form" autocomplete="off">
      <div class="add-form-main">
        <label class="sr-only" for="task-input">할 일 입력</label>
        <input
          type="text"
          id="task-input"
          class="task-input"
          placeholder="할 일을 입력하세요"
          maxlength="200"
          required
        >
        <button type="submit" class="btn btn-primary">추가</button>
      </div>
      <div class="add-form-deadline">
        <label for="deadline-input" class="deadline-label">마감일</label>
        <input
          type="date"
          id="deadline-input"
          class="deadline-input"
          aria-label="마감 기한"
        >
      </div>
    </form>

    <p class="global-empty-hint" id="global-empty-hint">
      할 일이 없습니다. 위에서 추가해 보세요.
    </p>

    <div class="todo-board" id="todo-board" aria-live="polite">
      <section class="todo-section">
        <h2 class="section-title">예정</h2>
        <p class="section-empty" id="empty-pending">예정된 할 일이 없습니다.</p>
        <ul class="todo-list" id="todo-list-pending"></ul>
      </section>

      <section class="todo-section">
        <h2 class="section-title">완료</h2>
        <p class="section-empty" id="empty-done">완료된 항목이 없습니다.</p>
        <ul class="todo-list" id="todo-list-done"></ul>
      </section>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
